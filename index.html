<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undercover</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f13; color: #e8e6df; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
  .container { width: 100%; max-width: 420px; text-align: center; }
  .icon { font-size: 4rem; margin-bottom: 1rem; }
  h1 { font-size: 2.5rem; font-weight: 700; letter-spacing: -1px; margin-bottom: 0.5rem; }
  .tagline { color: #9e9c94; font-size: 1rem; margin-bottom: 2.5rem; line-height: 1.6; }
  .btn { display: block; width: 100%; padding: 16px; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; text-decoration: none; transition: opacity 0.15s, transform 0.1s; margin-bottom: 1rem; border: none; }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: #6c63ff; color: #fff; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-secondary { background: #1c1c22; border: 0.5px solid #2e2e38; color: #e8e6df; }
  .btn-secondary:hover { background: #26262f; }
  .btn-icon { margin-right: 8px; }
  .footer { margin-top: 2rem; font-size: 12px; color: #444; }
</style>
</head>
<body>
<div class="container">
  <div class="icon">🕵️</div>
  <h1>Undercover</h1>
  <p class="tagline">Find the spy. Survive the vote.<br>Can you keep your cover?</p>
  <a href="game.html" class="btn btn-primary"><span class="btn-icon">🎮</span>Play now</a>
  <a href="instructions.html" class="btn btn-secondary"><span class="btn-icon">📖</span>How to play</a>
  <div class="footer">5–8 players · No app needed</div>
</div>
</body>
</html>
